<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fcd34d"/>
    </linearGradient>
    <linearGradient id="arrowgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:0.8"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1" opacity="0.8"/>
    </marker>
    <marker id="arrowhead-down" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399" opacity="0.8"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" rx="20" fill="url(#bg)"/>
  <rect width="900" height="580" rx="20" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>

  <!-- Ambient blobs -->
  <ellipse cx="150" cy="100" rx="200" ry="120" fill="#6366f1" opacity="0.04"/>
  <ellipse cx="750" cy="480" rx="200" ry="120" fill="#f472b6" opacity="0.04"/>
  <ellipse cx="450" cy="290" rx="150" ry="100" fill="#34d399" opacity="0.03"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.9" letter-spacing="2">ADSENSEI — SYSTEM ARCHITECTURE</text>
  <line x1="200" y1="48" x2="700" y2="48" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>

  <!-- ═══════════════════════════════════════════
       ROW 1 — INPUTS
  ═══════════════════════════════════════════ -->

  <!-- Box: Master Video -->
  <g transform="translate(60, 70)">
    <rect width="140" height="70" rx="12" fill="#0f0f20" stroke="#6366f1" stroke-width="1.2" opacity="0.9"/>
    <rect width="140" height="70" rx="12" fill="#6366f1" opacity="0.07"/>
    <text x="70" y="24" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#6366f1" letter-spacing="2" opacity="0.8">INPUT</text>
    <text x="70" y="44" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff">🎬 Master Video</text>
    <text x="70" y="60" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.4">MP4 · Any length</text>
  </g>

  <!-- Box: Audience CSV -->
  <g transform="translate(240, 70)">
    <rect width="140" height="70" rx="12" fill="#0f0f20" stroke="#f472b6" stroke-width="1.2" opacity="0.9"/>
    <rect width="140" height="70" rx="12" fill="#f472b6" opacity="0.07"/>
    <text x="70" y="24" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#f472b6" letter-spacing="2" opacity="0.8">INPUT</text>
    <text x="70" y="44" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff">👥 Audience CSV</text>
    <text x="70" y="60" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.4">age · gender · interests</text>
  </g>

  <!-- TokenRouter badge top-right -->
  <g transform="translate(620, 70)">
    <rect width="220" height="70" rx="12" fill="#0f0f20" stroke="#fbbf24" stroke-width="1.2"/>
    <rect width="220" height="70" rx="12" fill="#fbbf24" opacity="0.06"/>
    <text x="110" y="24" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#fbbf24" letter-spacing="2" opacity="0.8">AI ROUTING</text>
    <text x="110" y="44" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff">⚡ TokenRouter</text>
    <text x="110" y="60" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.4">60+ models · One API key</text>
  </g>

  <!-- ═══════════════════════════════════════════
       ARROWS: inputs → pipeline
  ═══════════════════════════════════════════ -->
  <!-- Master video → pipeline -->
  <line x1="130" y1="140" x2="130" y2="175" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrowhead)"/>
  <!-- CSV → pipeline -->
  <line x1="310" y1="140" x2="310" y2="175" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrowhead)"/>
  <!-- TokenRouter ↔ pipeline (dashed both ways) -->
  <line x1="620" y1="105" x2="530" y2="200" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- ═══════════════════════════════════════════
       ROW 2 — PIPELINE STEPS
  ═══════════════════════════════════════════ -->

  <!-- Step 1: VLM Analysis -->
  <g transform="translate(60, 175)">
    <rect width="155" height="80" rx="12" fill="#0f0f20" stroke="#6366f1" stroke-width="1.5"/>
    <rect width="155" height="80" rx="12" fill="#6366f1" opacity="0.1"/>
    <text x="77" y="20" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#6366f1" letter-spacing="2" opacity="0.9">STEP 01</text>
    <text x="77" y="38" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ffffff">VLM Analysis</text>
    <text x="77" y="54" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.5">Claude Vision</text>
    <text x="77" y="70" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.5">Frame captions · Timeline</text>
  </g>

  <!-- Arrow → Step 2 -->
  <line x1="215" y1="215" x2="248" y2="215" stroke="url(#arrowgrad)" stroke-width="1.8" marker-end="url(#arrowhead)"/>

  <!-- Step 2: K-Means Clustering -->
  <g transform="translate(248, 175)">
    <rect width="155" height="80" rx="12" fill="#0f0f20" stroke="#f472b6" stroke-width="1.5"/>
    <rect width="155" height="80" rx="12" fill="#f472b6" opacity="0.1"/>
    <text x="77" y="20" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#f472b6" letter-spacing="2" opacity="0.9">STEP 02</text>
    <text x="77" y="38" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ffffff">K-Means Cluster</text>
    <text x="77" y="54" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.5">Text embeddings</text>
    <text x="77" y="70" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.5">N audience segments</text>
  </g>

  <!-- Arrow → Step 3 -->
  <line x1="403" y1="215" x2="436" y2="215" stroke="url(#arrowgrad)" stroke-width="1.8" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Market Research -->
  <g transform="translate(436, 175)">
    <rect width="155" height="80" rx="12" fill="#0f0f20" stroke="#34d399" stroke-width="1.5"/>
    <rect width="155" height="80" rx="12" fill="#34d399" opacity="0.08"/>
    <text x="77" y="20" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#34d399" letter-spacing="2" opacity="0.9">STEP 03</text>
    <text x="77" y="38" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Market Research</text>
    <text x="77" y="54" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.5">Perplexity per segment</text>
    <text x="77" y="70" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.5">Insights · Citations</text>
  </g>

  <!-- Arrow → Step 4 -->
  <line x1="591" y1="215" x2="624" y2="215" stroke="url(#arrowgrad)" stroke-width="1.8" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Transform Planner -->
  <g transform="translate(624, 175)">
    <rect width="155" height="80" rx="12" fill="#0f0f20" stroke="#fbbf24" stroke-width="1.5"/>
    <rect width="155" height="80" rx="12" fill="#fbbf24" opacity="0.07"/>
    <text x="77" y="20" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#fbbf24" letter-spacing="2" opacity="0.9">STEP 04</text>
    <text x="77" y="38" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Transform Planner</text>
    <text x="77" y="54" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.5">Claude Sonnet</text>
    <text x="77" y="70" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.5">Colour · Speed · Overlays</text>
  </g>

  <!-- ═══════════════════════════════════════════
       ARROW DOWN → FFmpeg
  ═══════════════════════════════════════════ -->
  <line x1="701" y1="255" x2="701" y2="295" stroke="#34d399" stroke-width="1.8" stroke-dasharray="4,3" opacity="0.7" marker-end="url(#arrowhead-down)"/>
  <!-- curve back left to FFmpeg box center -->
  <path d="M 701 295 Q 701 330 450 330" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="450" y1="330" x2="450" y2="300" stroke="#34d399" stroke-width="1.5" opacity="0" />

  <!-- ═══════════════════════════════════════════
       ROW 3 — FFmpeg Renderer (center)
  ═══════════════════════════════════════════ -->
  <g transform="translate(310, 295)">
    <rect width="280" height="70" rx="14" fill="#0f0f20" stroke="url(#green)" stroke-width="2"/>
    <rect width="280" height="70" rx="14" fill="#34d399" opacity="0.08"/>
    <text x="140" y="22" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#34d399" letter-spacing="2" opacity="0.9">STEP 05 · RENDER</text>
    <text x="140" y="44" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="16" font-weight="800" fill="#ffffff">🎞 FFmpeg Renderer</text>
    <text x="140" y="62" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#ffffff" opacity="0.45">Applies transforms · Outputs variant MP4s</text>
  </g>

  <!-- Arrow from Step 4 down-left to FFmpeg -->
  <path d="M 701 255 Q 701 285 590 330" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5" marker-end="url(#arrowhead-down)"/>

  <!-- ═══════════════════════════════════════════
       ARROWS: FFmpeg → 3 outputs
  ═══════════════════════════════════════════ -->
  <line x1="380" y1="365" x2="200" y2="415" stroke="#6366f1" stroke-width="1.5" opacity="0.6" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="365" x2="450" y2="415" stroke="#f472b6" stroke-width="1.5" opacity="0.6" marker-end="url(#arrowhead)"/>
  <line x1="520" y1="365" x2="700" y2="415" stroke="#34d399" stroke-width="1.5" opacity="0.6" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════════════════════════════
       ROW 4 — 3 Variant Outputs
  ═══════════════════════════════════════════ -->

  <!-- Variant 0 -->
  <g transform="translate(80, 415)">
    <rect width="155" height="72" rx="12" fill="#0f0f20" stroke="#6366f1" stroke-width="1.2"/>
    <rect width="155" height="72" rx="12" fill="#6366f1" opacity="0.12"/>
    <circle cx="20" cy="20" r="6" fill="#6366f1" opacity="0.9"/>
    <text x="77" y="25" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#ffffff">Affluent Professionals</text>
    <text x="77" y="42" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.5">Warm cinematic · 0.88×</text>
    <text x="77" y="58" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#6366f1" opacity="0.8">group-0.mp4</text>
  </g>

  <!-- Variant 1 -->
  <g transform="translate(372, 415)">
    <rect width="155" height="72" rx="12" fill="#0f0f20" stroke="#f472b6" stroke-width="1.2"/>
    <rect width="155" height="72" rx="12" fill="#f472b6" opacity="0.12"/>
    <circle cx="20" cy="20" r="6" fill="#f472b6" opacity="0.9"/>
    <text x="77" y="25" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#ffffff">Young Urban Creatives</text>
    <text x="77" y="42" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.5">Cool contrast · 1.18×</text>
    <text x="77" y="58" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#f472b6" opacity="0.8">group-1.mp4</text>
  </g>

  <!-- Variant 2 -->
  <g transform="translate(664, 415)">
    <rect width="155" height="72" rx="12" fill="#0f0f20" stroke="#34d399" stroke-width="1.2"/>
    <rect width="155" height="72" rx="12" fill="#34d399" opacity="0.10"/>
    <circle cx="20" cy="20" r="6" fill="#34d399" opacity="0.9"/>
    <text x="77" y="25" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#ffffff">Suburban Families</text>
    <text x="77" y="42" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff" opacity="0.5">Natural warm · 2 overlays</text>
    <text x="77" y="58" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#34d399" opacity="0.8">group-2.mp4</text>
  </g>

  <!-- ═══════════════════════════════════════════
       BOTTOM ROW — Platform badges
  ═══════════════════════════════════════════ -->
  <g transform="translate(60, 516)">
    <!-- AgentHansa -->
    <rect width="130" height="36" rx="18" fill="#6366f1" opacity="0.12" stroke="#6366f1" stroke-width="0.8" opacity="0.5"/>
    <circle cx="18" cy="18" r="5" fill="#34d399"/>
    <text x="65" y="23" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.8">AgentHansa</text>
  </g>
  <g transform="translate(210, 516)">
    <!-- MCP Server -->
    <rect width="130" height="36" rx="18" fill="#f472b6" opacity="0.1" stroke="#f472b6" stroke-width="0.8" opacity="0.4"/>
    <text x="65" y="23" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.8">MCP Server</text>
  </g>
  <g transform="translate(360, 516)">
    <!-- FluxA -->
    <rect width="130" height="36" rx="18" fill="#fbbf24" opacity="0.1" stroke="#fbbf24" stroke-width="0.8" opacity="0.4"/>
    <text x="65" y="23" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.8">FluxA USDC</text>
  </g>
  <g transform="translate(510, 516)">
    <!-- Next.js UI -->
    <rect width="130" height="36" rx="18" fill="#34d399" opacity="0.1" stroke="#34d399" stroke-width="0.8" opacity="0.4"/>
    <text x="65" y="23" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.8">Next.js 16 UI</text>
  </g>
  <g transform="translate(660, 516)">
    <!-- FastAPI -->
    <rect width="130" height="36" rx="18" fill="#818cf8" opacity="0.1" stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
    <text x="65" y="23" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.8">FastAPI Backend</text>
  </g>

  <!-- Bottom label -->
  <line x1="60" y1="508" x2="840" y2="508" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
  <text x="450" y="504" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#ffffff" opacity="0.2" letter-spacing="2">INFRASTRUCTURE</text>
</svg>
